# ============================================
# AzerothCore WotLK 3.3.5a - 绿联 NAS Docker Compose
# 适配: DXP4800 Plus (Intel 8505 x86_64)
# Author: asm0x1
# ============================================
#
# 部署方式 (绿联 Docker 管理界面):
#   项目文件夹: 指向本 nas/ 目录
#   .env 文件:  复制 .env.dist 为 .env 并修改
#   数据目录:   将客户端地图放入 nas/data/ 下
#
#   所有镜像从 Docker Hub 自动拉取，无需构建。
# ============================================

services:
  # ============================================
  # MariaDB 10.11 数据库
  # ============================================
  ac-database:
    image: mariadb:10.11
    container_name: acore-database
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    ports:
      - ${DOCKER_DB_EXTERNAL_PORT:-63306}:3306
    environment:
      MARIADB_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
    volumes:
      - ac-database-data:/var/lib/mysql
    healthcheck:
      test: '/usr/bin/mariadb --user=root --password=$$MARIADB_ROOT_PASSWORD --execute "SHOW DATABASES;"'
      interval: 5s
      timeout: 40s
      retries: 20
    networks:
      - ac-network
    # 资源限制 (按需取消注释)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 1G

  # ============================================
  # 世界服务器 (预构建镜像，从 Docker Hub 拉取)
  # ============================================
  ac-worldserver:
    image: asm0x1/wow-worldserver:latest
    container_name: acore-worldserver
    restart: unless-stopped
    stdin_open: true
    tty: true
    cap_add:
      - SYS_NICE
    ports:
      - ${DOCKER_WORLD_EXTERNAL_PORT:-8085}:8085
      - ${DOCKER_SOAP_EXTERNAL_PORT:-7878}:7878
    environment:
      DB_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
      BOT_MIN_COUNT: ${BOT_MIN_COUNT:-15}
      BOT_MAX_COUNT: ${BOT_MAX_COUNT:-20}
      BOT_MIN_LEVEL: ${BOT_MIN_LEVEL:-1}
      BOT_MAX_LEVEL: ${BOT_MAX_LEVEL:-80}
      BOT_ALLIANCE_RATIO: ${BOT_ALLIANCE_RATIO:-50}
      BOT_HORDE_RATIO: ${BOT_HORDE_RATIO:-50}
    volumes:
      - acore-logs:/opt/wow/logs
      - ./data:/opt/wow/data:ro
    depends_on:
      ac-database:
        condition: service_healthy
    networks:
      - ac-network
    # 资源限制 (按需取消注释)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G

  # ============================================
  # Realm 地址初始化 (一次性)
  # ============================================
  ac-realm-init:
    image: mariadb:10.11
    container_name: acore-realm-init
    depends_on:
      ac-database:
        condition: service_healthy
      ac-worldserver:
        condition: service_started
    environment:
      DB_HOST: ac-database
      DB_USER: root
      DB_PASS: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
      REALM_IP: ${REALM_IP:-127.0.0.1}
      REALM_PORT: ${DOCKER_WORLD_EXTERNAL_PORT:-8085}
    volumes:
      - ./scripts/realm-init.sh:/realm-init.sh:ro
      - ./:/nas-project:ro
    entrypoint: ["bash", "/realm-init.sh"]
    networks:
      - ac-network
    restart: "no"

  # ============================================
  # 默认管理员账户创建 (一次性)
  # ============================================
  ac-account-init:
    image: python:3.11-alpine
    container_name: acore-account-init
    depends_on:
      ac-database:
        condition: service_healthy
      ac-realm-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: ac-database
      DB_USER: root
      DB_PASS: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
      DB_NAME: acore_auth
      DEFAULT_ACCOUNT_USER: ${DEFAULT_ACCOUNT_USER:-}
      DEFAULT_ACCOUNT_PASS: ${DEFAULT_ACCOUNT_PASS:-}
      DEFAULT_ACCOUNT_GMLEVEL: ${DEFAULT_ACCOUNT_GMLEVEL:-3}
      DEFAULT_ACCOUNT_EXPANSION: ${DEFAULT_ACCOUNT_EXPANSION:-2}
    volumes:
      - ./scripts/create-default-account.py:/create-account.py:ro
    entrypoint: ["sh", "-c", "pip install -q pymysql && python /create-account.py"]
    networks:
      - ac-network
    restart: "no"

  # ============================================
  # 认证服务器 (预构建镜像，从 Docker Hub 拉取)
  # ============================================
  ac-authserver:
    image: asm0x1/wow-authserver:latest
    container_name: acore-authserver
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - ${DOCKER_AUTH_EXTERNAL_PORT:-3724}:3724
    environment:
      DB_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
    volumes:
      - acore-logs:/opt/wow/logs
    depends_on:
      ac-database:
        condition: service_healthy
      ac-realm-init:
        condition: service_completed_successfully
    networks:
      - ac-network

  # ============================================
  # Web 注册页面 (预构建镜像，从 Docker Hub 拉取)
  # ============================================
  ac-registration:
    image: asm0x1/wow-registration:latest
    container_name: acore-registration
    restart: unless-stopped
    ports:
      - ${DOCKER_REGISTRATION_EXTERNAL_PORT:-8765}:80
    volumes:
      - ./:/nas-project:ro
    depends_on:
      ac-realm-init:
        condition: service_completed_successfully
    command: >
      sh -c "
      if [ -f /nas-project/.env ]; then . /nas-project/.env; fi;
      export REALM_IP=\"\${REALM_IP:-127.0.0.1}\";
      envsubst '\$REALM_IP' < /var/www/html/application/config/config.php > /tmp/config.php && mv /tmp/config.php /var/www/html/application/config/config.php;
      apache2-foreground
      "
    networks:
      - ac-network

  # ============================================
  # phpMyAdmin (可选管理工具)
  # 取消下面注释即可启用
  # ============================================
  # phpmyadmin:
  #   image: phpmyadmin
  #   ports:
  #     - 8081:80
  #   environment:
  #     - PMA_ARBITRARY=1
  #     - PMA_HOST=ac-database
  #     - PMA_USER=root
  #     - PMA_PASSWORD=${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
  #   depends_on:
  #     ac-database:
  #       condition: service_healthy
  #   networks:
  #     - ac-network

networks:
  ac-network:
    driver: bridge

volumes:
  ac-database-data:
  acore-logs:

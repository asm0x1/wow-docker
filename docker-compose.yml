# ============================================
# AzerothCore WotLK 3.3.5a Docker Compose
# 从群晖 SPK WoWServer v1.0.52 迁移
# Author: asm0x1
# ============================================

services:
  # ============================================
  # MariaDB 10.11 数据库 (SPK 二进制链接 libmariadb)
  # ============================================
  ac-database:
    image: mariadb:10.11
    container_name: acore-database
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    ports:
      - ${DOCKER_DB_EXTERNAL_PORT:-63306}:3306
    environment:
      MARIADB_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
    volumes:
      - ac-database-data:/var/lib/mysql
    healthcheck:
      test: '/usr/bin/mariadb --user=root --password=$$MARIADB_ROOT_PASSWORD --execute "SHOW DATABASES;"'
      interval: 5s
      timeout: 40s
      retries: 20
    networks:
      - ac-network

  # ============================================
  # 世界服务器 - 先启动以创建数据库表结构
  # (worldserver 启动时会自动运行 DB migrations)
  # ============================================
  ac-worldserver:
    build:
      context: .
      dockerfile: Dockerfile.worldserver
    container_name: acore-worldserver
    restart: unless-stopped
    stdin_open: true
    tty: true
    cap_add:
      - SYS_NICE
    ports:
      - ${DOCKER_WORLD_EXTERNAL_PORT:-8085}:8085
      - ${DOCKER_SOAP_EXTERNAL_PORT:-7878}:7878
    environment:
      DB_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
      BOT_MIN_COUNT: ${BOT_MIN_COUNT:-15}
      BOT_MAX_COUNT: ${BOT_MAX_COUNT:-20}
      BOT_MIN_LEVEL: ${BOT_MIN_LEVEL:-1}
      BOT_MAX_LEVEL: ${BOT_MAX_LEVEL:-80}
      BOT_ALLIANCE_RATIO: ${BOT_ALLIANCE_RATIO:-50}
      BOT_HORDE_RATIO: ${BOT_HORDE_RATIO:-50}
    volumes:
      - acore-logs:/opt/wow/logs
      - ./scripts/lua:/opt/wow/lua_scripts:ro
      - ./database:/opt/wow/database:ro
      - ./conf/modules:/opt/wow/etc/modules
      - ./data:/opt/wow/data:ro
    depends_on:
      ac-database:
        condition: service_healthy
    networks:
      - ac-network

  # ============================================
  # 设置 Realm 地址 (等待 worldserver 创建 realmlist 表后更新)
  # ============================================
  ac-realm-init:
    image: mariadb:10.11
    container_name: acore-realm-init
    depends_on:
      ac-database:
        condition: service_healthy
      ac-worldserver:
        condition: service_started
    environment:
      DB_HOST: ac-database
      DB_USER: root
      DB_PASS: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
      REALM_IP: ${REALM_IP:-127.0.0.1}
      REALM_PORT: ${DOCKER_WORLD_EXTERNAL_PORT:-8085}
    volumes:
      - ./scripts/realm-init.sh:/realm-init.sh:ro
    entrypoint: ["bash", "/realm-init.sh"]
    networks:
      - ac-network
    restart: "no"

  # ============================================
  # 创建默认管理员账户 (等待 worldserver 完成迁移后)
  # ============================================
  ac-account-init:
    image: python:3.11-alpine
    container_name: acore-account-init
    depends_on:
      ac-database:
        condition: service_healthy
      ac-realm-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: ac-database
      DB_USER: root
      DB_PASS: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
      DB_NAME: acore_auth
      DEFAULT_ACCOUNT_USER: ${DEFAULT_ACCOUNT_USER}
      DEFAULT_ACCOUNT_PASS: ${DEFAULT_ACCOUNT_PASS}
      DEFAULT_ACCOUNT_GMLEVEL: ${DEFAULT_ACCOUNT_GMLEVEL:-3}
      DEFAULT_ACCOUNT_EXPANSION: ${DEFAULT_ACCOUNT_EXPANSION:-2}
    volumes:
      - ./scripts/create-default-account.py:/create-account.py:ro
    entrypoint: ["sh", "-c", "pip install -q pymysql && python /create-account.py"]
    networks:
      - ac-network
    restart: "no"

  # ============================================
  # 认证服务器 (SPK authserver)
  # ============================================
  ac-authserver:
    build:
      context: .
      dockerfile: Dockerfile.authserver
    container_name: acore-authserver
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - ${DOCKER_AUTH_EXTERNAL_PORT:-3724}:3724
    environment:
      DB_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
    volumes:
      - acore-logs:/opt/wow/logs
      - ./database:/opt/wow/database:ro
    depends_on:
      ac-database:
        condition: service_healthy
      ac-realm-init:
        condition: service_completed_successfully
    networks:
      - ac-network

  # ============================================
  # Web 注册页面 (WoWSimpleRegistration)
  # ============================================
  ac-registration:
    build:
      context: .
      dockerfile: Dockerfile.registration
    container_name: acore-registration
    restart: unless-stopped
    ports:
      - ${DOCKER_REGISTRATION_EXTERNAL_PORT:-8765}:80
    volumes:
      - ./WoWRegistration:/var/www/html
    environment:
      - REALM_IP=${REALM_IP:-127.0.0.1}
    depends_on:
      ac-realm-init:
        condition: service_completed_successfully
    command: >
      sh -c "
      envsubst '\$REALM_IP' < /var/www/html/application/config/config.php > /tmp/config.php && mv /tmp/config.php /var/www/html/application/config/config.php;
      apache2-foreground
      "
    networks:
      - ac-network

  # ============================================
  # phpMyAdmin (可选: docker compose --profile management up -d)
  # ============================================
  phpmyadmin:
    image: phpmyadmin
    ports:
      - 8081:80
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=ac-database
      - PMA_USER=root
      - PMA_PASSWORD=${DOCKER_DB_ROOT_PASSWORD:-wow@asm0x1}
    depends_on:
      ac-database:
        condition: service_healthy
    networks:
      - ac-network
    profiles:
      - management

networks:
  ac-network:
    driver: bridge

volumes:
  ac-database-data:
  acore-logs:
